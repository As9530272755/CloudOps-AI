# CloudOps Platform 配置文件模板
# 安装脚本会自动替换以下占位符：
#   {{DB_HOST}}       - 数据库地址
#   {{DB_PASSWORD}}   - 数据库密码
#   {{JWT_SECRET}}    - JWT 密钥

server:
  backend:
    host: "0.0.0.0"
    port: 9000
    mode: "release"
    read_timeout: 60s
    write_timeout: 600s
    max_connections: 10000

  frontend:
    host: "0.0.0.0"
    port: 18000

  ai_service:
    host: "0.0.0.0"
    port: 8001
    enabled: false

database:
  postgres:
    host: "127.0.0.1"
    port: 5432
    database: "cloudops"
    username: "cloudops"
    password: "cloudops123"
    ssl_mode: "disable"
    max_connections: 100
    max_idle: 10

  redis:
    host: "127.0.0.1"
    port: 6379
    db: 0
    pool_size: 100

kubernetes:
  connection_pool:
    max_size: 50
    idle_timeout: 10m
    health_check: 30s

  terminal:
    enabled: true
    max_sessions: 100
    session_timeout: 30m
    recording_enabled: true
    recording_path: "/var/lib/cloudops/recordings"
    allowed_shells:
      - "/bin/sh"
      - "/bin/bash"

ai:
  openclaw:
    enabled: false

security:
  jwt:
    secret: "dev-jwt-secret-key-2024cloudops"
    access_expire: 1h
    refresh_expire: 24h

  rate_limit:
    enabled: true
    requests_per_minute: 100
    burst: 20

  audit:
    enabled: true
    log_path: "/var/log/cloudops/audit.log"
    retention_days: 90

tenant:
  enabled: true
  max_tenants: 100
  default_tenant: "default"
  quotas:
    max_clusters: 20
    max_users: 100
    max_terminal_sessions: 50
    storage_quota_gb: 100

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file:
    path: "/var/log/cloudops/app.log"
    max_size_mb: 100
    max_backups: 10
    max_age_days: 30
    compress: true
